<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>Set new password — Market Juice</title>
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
  <div class="auth-wrap">
    <a href="/" class="auth-logo">
      <span>📈</span><span class="grad">Market <em>Juice</em></span>
    </a>

    <div class="auth-card">
      <h1>Set a new password</h1>
      <p class="sub">Pick something at least 6 characters. The kid will use this to log in.</p>

      <div class="alert alert-error" id="err" hidden></div>
      <div class="alert alert-success" id="ok" hidden>Password updated! Redirecting to log in…</div>

      <form id="reset-form" novalidate>
        <div class="form-row">
          <label for="password">New password</label>
          <input id="password" name="password" type="password" autocomplete="new-password"
                 required minlength="6">
        </div>
        <div class="form-row">
          <label for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" autocomplete="new-password"
                 required minlength="6">
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Reset password</button>
      </form>
    </div>

    <p class="foot-link">
      <a href="/login">← Back to log in</a>
    </p>
  </div>

  <script>
    (function () {
      const form = document.getElementById('reset-form');
      const errEl = document.getElementById('err');
      const okEl  = document.getElementById('ok');
      const btn   = document.getElementById('submit-btn');

      // Pull the token from the URL ?token=…
      const params = new URLSearchParams(location.search);
      const token = params.get('token') || '';

      if (!token) {
        errEl.textContent = 'No reset token in the URL. Use the link from your email.';
        errEl.hidden = false;
        btn.disabled = true;
      }

      function showError(msg) { errEl.textContent = msg; errEl.hidden = false; okEl.hidden = true; }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.hidden = true;

        const password = form.password.value;
        const confirm  = form.confirm.value;

        if (password.length < 6) {
          showError('Password must be at least 6 characters.');
          return;
        }
        if (password !== confirm) {
          showError("Passwords don't match. Try again!");
          return;
        }

        btn.disabled = true;
        const original = btn.textContent;
        btn.textContent = 'Updating…';

        try {
          const res = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
          });
          const body = await res.json().catch(() => ({}));
          if (res.ok && body.success) {
            form.hidden = true;
            okEl.hidden = false;
            setTimeout(() => { location.href = '/login'; }, 2000);
            return;
          }
          showError(body.error || 'Invalid or expired reset link. Request a new one.');
        } catch (err) {
          console.error('[reset] network error:', err);
          showError('Network error. Check your connection and try again.');
        } finally {
          btn.disabled = false;
          btn.textContent = original;
        }
      });
    })();
  </script>
</body>
</html>
