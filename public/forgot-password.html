<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>Reset password — Market Juice</title>
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
  <div class="auth-wrap">
    <a href="/" class="auth-logo">
      <span>📈</span><span class="grad">Market <em>Juice</em></span>
    </a>

    <div class="auth-card">
      <h1>Reset your password</h1>
      <p class="sub">Enter the parent email address used during signup. We'll send a reset link.</p>

      <div class="alert alert-success" id="ok" hidden>
        If that email is in our system, we sent a reset link. Check your inbox!
      </div>

      <form id="forgot-form" novalidate>
        <div class="form-row">
          <label for="email">Parent email</label>
          <input id="email" name="email" type="email" autocomplete="email"
                 required inputmode="email" autocorrect="off"
                 spellcheck="false" autofocus>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Send reset link</button>
      </form>
    </div>

    <p class="foot-link">
      <a href="/login">← Back to log in</a>
    </p>
  </div>

  <script>
    (function () {
      const form = document.getElementById('forgot-form');
      const okEl = document.getElementById('ok');
      const btn  = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = form.email.value.trim();

        btn.disabled = true;
        const original = btn.textContent;
        btn.textContent = 'Sending…';

        try {
          await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
        } catch (err) {
          console.error('[forgot] network error:', err);
        }

        // Always show the same success message — server intentionally
        // never reveals whether the email exists.
        form.hidden = true;
        okEl.hidden = false;
        btn.disabled = false;
        btn.textContent = original;
      });
    })();
  </script>
</body>
</html>
