<!-- public/icons/logo-mark.svg
     Market Juice wordmark partner — citrus slice with a rising chart line
     piercing through. Transparent background so it sits cleanly on the
     dark navy hero. Brand palette: purple rind/chart (#bc8cff), gold-to-
     orange pulp gradient (#f0c040 → #f0883e). 200×200 viewBox keeps the
     math simple. Render at any size via the wrapping element. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Market Juice logo">
  <defs>
    <radialGradient id="pulpGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="65%" stop-color="#f0a830"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </radialGradient>
  </defs>

  <!-- Pulp fill — sits inside the rind. r=72 with rind stroke=8 (centered
       on r=76) leaves the rind reading as a thick purple ring. -->
  <circle cx="100" cy="100" r="72" fill="url(#pulpGrad)"/>

  <!-- Six wedge dividers radiating from a small center hub. Rotated copies
       of one line keep the geometry symmetric. -->
  <g transform="translate(100 100)" stroke="#bc8cff" stroke-width="5" stroke-linecap="round">
    <line x1="0" y1="-9" x2="0" y2="-66"/>
    <line x1="0" y1="-9" x2="0" y2="-66" transform="rotate(60)"/>
    <line x1="0" y1="-9" x2="0" y2="-66" transform="rotate(120)"/>
    <line x1="0" y1="-9" x2="0" y2="-66" transform="rotate(180)"/>
    <line x1="0" y1="-9" x2="0" y2="-66" transform="rotate(240)"/>
    <line x1="0" y1="-9" x2="0" y2="-66" transform="rotate(300)"/>
  </g>

  <!-- Center hub — small filled circle where the wedges converge. -->
  <circle cx="100" cy="100" r="6" fill="#bc8cff"/>

  <!-- Outer rind. Stroke OVER the pulp + dividers so its inner edge is
       crisp and the dividers terminate cleanly against it. -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#bc8cff" stroke-width="8"/>

  <!-- Rising chart line, piercing through the citrus from lower-left
       to upper-right. Drawn last so it sits on top of everything. The
       arrowhead is a small filled triangle along the line's tangent. -->
  <g stroke="#5b2d99" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="42,148 75,108 102,128 134,78 170,42"/>
  </g>
  <!-- Arrowhead — filled triangle aligned with the final segment's angle. -->
  <polygon points="170,42 154,49 159,30" fill="#5b2d99"/>
</svg>
